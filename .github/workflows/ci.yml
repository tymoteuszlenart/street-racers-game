name: CI

on:
  push:
    branches:
      - main
  pull_request:
    branches:
      - main

jobs:
  application-tests:
    name: Application tests
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up PHP 8.3
        uses: shivammathur/setup-php@v2
        with:
          php-version: '8.3'
          extensions: dom, curl, libxml, mbstring, zip, pcntl, pdo, sqlite, pdo_sqlite, pdo_mysql, bcmath, intl, gd, exif, iconv
          coverage: none

      - name: Resolve Composer cache directory
        id: composer-cache
        run: echo "dir=$(composer config cache-files-dir)" >> $GITHUB_OUTPUT

      - name: Cache Composer packages
        uses: actions/cache@v4
        with:
          path: ${{ steps.composer-cache.outputs.dir }}
          key: ${{ runner.os }}-composer-${{ hashFiles('**/composer.lock') }}
          restore-keys: |
            ${{ runner.os }}-composer-

      - name: Install Composer dependencies
        run: composer install --no-interaction --prefer-dist

      - name: Set up Node.js 22
        uses: actions/setup-node@v4
        with:
          node-version: '22'
          cache: npm

      - name: Build production frontend assets
        run: |
          npm ci
          npm run build

      - name: Bootstrap Laravel environment
        run: |
          cp .env.example .env
          php artisan key:generate

      - name: Run PHPUnit (SQLite in-memory)
        run: php artisan test

      - name: Run Laravel Pint (code style)
        run: ./vendor/bin/pint --test

  integration-tests:
    name: Database integration tests
    runs-on: ubuntu-latest

    services:
      mysql:
        image: mysql:8.0
        env:
          MYSQL_ROOT_PASSWORD: password
          MYSQL_DATABASE: street_racers_test
          MYSQL_USER: laravel
          MYSQL_PASSWORD: password
        ports:
          - 3306:3306
        options: >-
          --health-cmd="mysqladmin ping"
          --health-interval=10s
          --health-timeout=5s
          --health-retries=5

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up PHP 8.3
        uses: shivammathur/setup-php@v2
        with:
          php-version: '8.3'
          extensions: dom, curl, libxml, mbstring, zip, pcntl, pdo, pdo_mysql, bcmath, intl
          coverage: none

      - name: Resolve Composer cache directory
        id: composer-cache
        run: echo "dir=$(composer config cache-files-dir)" >> $GITHUB_OUTPUT

      - name: Cache Composer packages
        uses: actions/cache@v4
        with:
          path: ${{ steps.composer-cache.outputs.dir }}
          key: ${{ runner.os }}-composer-${{ hashFiles('**/composer.lock') }}
          restore-keys: |
            ${{ runner.os }}-composer-

      - name: Install Composer dependencies
        run: composer install --no-interaction --prefer-dist

      - name: Provision MySQL test database
        run: |
          sudo apt-get update
          sudo apt-get install -y mysql-client
          mysql -h 127.0.0.1 -P 3306 -u root -ppassword -e "
            CREATE DATABASE IF NOT EXISTS street_racers_test;
            CREATE USER IF NOT EXISTS 'laravel'@'localhost' IDENTIFIED BY 'password';
            CREATE USER IF NOT EXISTS 'laravel'@'127.0.0.1' IDENTIFIED BY 'password';
            GRANT ALL PRIVILEGES ON street_racers_test.* TO 'laravel'@'localhost';
            GRANT ALL PRIVILEGES ON street_racers_test.* TO 'laravel'@'127.0.0.1';
            FLUSH PRIVILEGES;
          "

      - name: Bootstrap Laravel environment
        run: |
          cp .env.example .env
          php artisan key:generate

      - name: Run PHPUnit (MySQL integration suite)
        run: composer test:integration
